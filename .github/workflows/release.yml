name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: evict-macos-arm
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: evict-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - run: cp target/${{ matrix.target }}/release/evict ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            evict-macos-arm/evict-macos-arm
            evict-linux-amd64/evict-linux-amd64

  homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Update tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM=$(sha256sum evict-macos-arm/evict-macos-arm | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum evict-linux-amd64/evict-linux-amd64 | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/kkd16/homebrew-tap.git
          cd homebrew-tap
          mkdir -p Formula

          printf '%s\n' \
            'class Evict < Formula' \
            "  desc \"Kill whatever process is using a given port\"" \
            "  homepage \"https://github.com/kkd16/evict\"" \
            "  version \"${VERSION}\"" \
            '  license "MIT"' \
            '' \
            '  if OS.mac?' \
            "    url \"https://github.com/kkd16/evict/releases/download/v#{version}/evict-macos-arm\"" \
            "    sha256 \"${SHA_ARM}\"" \
            '  elsif OS.linux?' \
            "    url \"https://github.com/kkd16/evict/releases/download/v#{version}/evict-linux-amd64\"" \
            "    sha256 \"${SHA_LINUX}\"" \
            '  end' \
            '' \
            '  def install' \
            '    binary = Dir["evict-*"].first || "evict"' \
            '    mv binary, "evict"' \
            '    bin.install "evict"' \
            '  end' \
            '' \
            '  test do' \
            '    assert_match "evict", shell_output("#{bin}/evict 2>&1", 1)' \
            '  end' \
            'end' > Formula/evict.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/evict.rb
          git commit -m "evict ${VERSION}"
          git push
